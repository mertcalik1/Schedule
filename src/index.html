<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Your Schedule" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/logo.png" />
    <title>Your Schedule</title>
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Calendar control panel">
        <div class="sidebar-toggle-row">
          <button class="sidebar-toggle" id="sidebarToggleButton" type="button" title="Close panel" aria-label="Close panel">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
        <div class="sidebar-content" id="sidebarContent">
          <section class="brand-block">
            <img class="brand-mark" src="assets/logo.png" alt="" aria-hidden="true" />
            <div>
              <p class="eyebrow">Personal planner</p>
              <h1>Your Schedule</h1>
            </div>
          </section>

          <section class="panel routines-panel">
            <div class="panel-heading">
              <h2>Routines</h2>
              <div class="routine-toolbar" aria-label="Routine tools">
                <button class="icon-button" id="editRoutinesButton" type="button" title="Edit routines" aria-label="Edit routines">
                  <svg class="gear-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
                    <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.05.05a2 2 0 0 1-2.83 2.83l-.05-.05A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.55V21a2 2 0 0 1-4 0v-.05a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.05.05a2 2 0 0 1-2.83-2.83l.05-.05A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 0 1 0-4h.05A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.05-.05a2 2 0 0 1 2.83-2.83l.05.05A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 0 1 4 0v.05A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.05-.05a2 2 0 0 1 2.83 2.83l-.05.05A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 0 1 0 4h-.05A1.7 1.7 0 0 0 19.4 15Z" />
                  </svg>
                </button>
              </div>
            </div>
            <div id="routineList" class="routine-list" aria-label="Draggable routines"></div>
          </section>

        </div>

        <section class="notification-panel sidebar-bottom">
          <button class="notification-button" id="notificationBellButton" type="button" title="Notifications" aria-label="Notifications">
            <svg class="bell-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" />
              <path d="M10 21h4" />
            </svg>
            <span class="notification-dot" aria-hidden="true"></span>
          </button>
          <button class="theme-button" id="themeToggleButton" type="button" title="Dark mode" aria-label="Dark mode">
            <svg class="moon-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 14.8A8.5 8.5 0 0 1 9.2 3a7 7 0 1 0 11.8 11.8Z" />
            </svg>
            <svg class="sun-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2" />
              <path d="M12 20v2" />
              <path d="M4.93 4.93l1.41 1.41" />
              <path d="M17.66 17.66l1.41 1.41" />
              <path d="M2 12h2" />
              <path d="M20 12h2" />
              <path d="M4.93 19.07l1.41-1.41" />
              <path d="M17.66 6.34l1.41-1.41" />
            </svg>
          </button>
          <button class="user-settings-button" id="userSettingsButton" type="button" title="User settings" aria-label="User settings">
            <svg class="gear-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
              <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.05.05a2 2 0 0 1-2.83 2.83l-.05-.05A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.55V21a2 2 0 0 1-4 0v-.05a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.05.05a2 2 0 0 1-2.83-2.83l.05-.05A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 0 1 0-4h.05A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.05-.05a2 2 0 0 1 2.83-2.83l.05.05A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 0 1 4 0v.05A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.05-.05a2 2 0 0 1 2.83 2.83l-.05.05A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 1.55 1H21a2 2 0 0 1 0 4h-.05A1.7 1.7 0 0 0 19.4 15Z" />
            </svg>
          </button>
          <div class="notification-chat hidden" id="notificationChat" role="status" aria-live="polite">
            <div class="chat-bubble-title">Notifications</div>
            <p id="notificationStatus">Waiting for browser permission.</p>
            <button class="secondary-button compact-button" id="enableNotificationsButton" type="button">Enable notifications</button>
          </div>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <button class="secondary-button" id="todayButton" type="button">Today</button>
          <div class="toolbar" role="toolbar" aria-label="Calendar tools">
            <button class="icon-button" id="previousButton" type="button" title="Previous" aria-label="Previous">&lt;</button>
            <div class="range-display">
              <p class="eyebrow" id="todayLabel"></p>
              <h2 id="currentRangeLabel">This month</h2>
            </div>
            <button class="icon-button" id="nextButton" type="button" title="Next" aria-label="Next">&gt;</button>
          </div>
        </header>

        <nav class="view-tabs" aria-label="View selection">
          <button class="tab active" data-view="day" type="button">Day</button>
          <button class="tab" data-view="week" type="button">Week</button>
          <button class="tab" data-view="month" type="button">Month</button>
          <button class="tab" data-view="year" type="button">Year</button>
        </nav>

        <section class="content-grid">
          <section class="calendar-panel" aria-label="Calendar">
            <div id="calendarView"></div>
          </section>
          <section class="routine-check-card hidden" id="routineChecklistPanel" aria-label="Routine tracking"></section>
          <section class="time-analysis-card hidden" id="timeAnalysisPanel" aria-label="Time analysis">
            <div class="panel-heading">
              <h2>Time analysis</h2>
              <span id="totalHours" class="metric-pill">0 hours</span>
            </div>
            <div id="analysisList" class="analysis-list"></div>
          </section>
        </section>
      </section>
    </main>

    <section class="modal-backdrop hidden" id="eventModal" aria-hidden="true">
      <div class="event-modal" role="dialog" aria-modal="true" aria-labelledby="formTitle">
        <div class="modal-header">
          <div>
            <p class="eyebrow" id="modalDateLabel"></p>
            <h2 id="formTitle">New event</h2>
          </div>
          <button class="icon-button" id="closeModalButton" type="button" title="Close" aria-label="Close">x</button>
        </div>

        <div class="modal-layout">
          <section>
            <h3>Events on this day</h3>
            <div id="dayEventsList" class="day-events-list"></div>
          </section>

          <form id="eventForm" class="event-form">
            <input type="hidden" id="eventId" />

            <label>
              Title
              <input id="title" name="title" type="text" placeholder="Enter your schedule" required />
            </label>

            <div class="form-grid">
              <label>
                Start
                <input id="start" name="start" type="datetime-local" required />
              </label>
              <label>
                End
                <input id="end" name="end" type="datetime-local" required />
              </label>
            </div>

            <div class="form-grid">
              <label>
                Category
                <select id="category" name="category" required>
                  <option value="saglik">Health</option>
                  <option value="is">Work</option>
                  <option value="egitim">Education</option>
                  <option value="sosyal">Social</option>
                  <option value="spor">Sports</option>
                  <option value="kisisel">Personal</option>
                  <option value="aile">Family</option>
                  <option value="arkadas">Friends</option>
                  <option value="alisveris">Shopping</option>
                  <option value="ev">Housework</option>
                  <option value="seyahat">Travel</option>
                  <option value="finans">Finance</option>
                  <option value="hobi">Hobby</option>
                  <option value="dinlenme">Rest</option>
                  <option value="bos">Free time</option>
                </select>
              </label>
              <label>
                Reminder
                <select id="reminder" name="reminder">
                  <option value="0">At start time</option>
                  <option value="5">5 min before</option>
                  <option value="15" selected>15 min before</option>
                  <option value="60">1 hour before</option>
                  <option value="1440">1 day before</option>
                </select>
              </label>
            </div>

            <label>
              Repeat
              <select id="repeat" name="repeat">
                <option value="none">One-time</option>
                <option value="daily">Every day</option>
                <option value="weekly">Every week</option>
                <option value="monthly">Every month</option>
                <option value="yearly">Every year</option>
              </select>
            </label>

            <label>
              Notes
              <textarea id="notes" name="notes" rows="3" placeholder="Address, preparation, or a short note"></textarea>
            </label>

            <div class="form-actions">
              <button class="primary-button" type="submit">Save</button>
              <button class="secondary-button" id="resetFormButton" type="button">Clear</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <section class="modal-backdrop hidden" id="userSettingsModal" aria-hidden="true">
      <div class="event-modal user-settings-modal" role="dialog" aria-modal="true" aria-labelledby="userSettingsTitle">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Preferences</p>
            <h2 id="userSettingsTitle">User settings</h2>
          </div>
          <button class="icon-button" id="closeUserSettingsButton" type="button" title="Close" aria-label="Close">x</button>
        </div>

        <form class="user-settings-form">
          <label>
            Language
            <select id="languageSelect">
              <option value="en">English</option>
              <option value="tr">Turkish</option>
            </select>
          </label>

          <label>
            Holiday region
            <select id="settingsHolidayCountrySelect">
              <option value="AUTO">Auto holidays</option>
              <option value="TR">Turkey</option>
              <option value="US">United States</option>
              <option value="DE">Germany</option>
              <option value="FR">France</option>
              <option value="GB">United Kingdom</option>
            </select>
          </label>
        </form>
      </div>
    </section>

    <section class="modal-backdrop hidden" id="routineModal" aria-hidden="true">
      <div class="event-modal routine-modal" role="dialog" aria-modal="true" aria-labelledby="routineModalTitle">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Routine management</p>
            <h2 id="routineModalTitle">Routines</h2>
          </div>
          <button class="icon-button" id="closeRoutineModalButton" type="button" title="Close" aria-label="Close">x</button>
        </div>

        <div class="modal-layout routine-manager-layout">
          <form id="routineForm" class="routine-form">
            <input type="hidden" id="routineId" />
            <label>
              Routine name
              <input id="routineTitle" type="text" placeholder="Enter your routine" required />
            </label>
            <div class="form-grid compact-grid">
              <label>
                Time
                <input id="routineTime" type="time" value="09:00" required />
              </label>
              <label>
                Duration
                <input id="routineDuration" type="number" min="5" step="5" value="60" required />
              </label>
            </div>
            <label>
              Category
              <select id="routineCategory" required>
                <option value="saglik">Health</option>
                <option value="is">Work</option>
                <option value="egitim">Education</option>
                <option value="sosyal">Social</option>
                <option value="spor">Sports</option>
                <option value="kisisel">Personal</option>
                <option value="aile">Family</option>
                <option value="arkadas">Friends</option>
                <option value="alisveris">Shopping</option>
                <option value="ev">Housework</option>
                <option value="seyahat">Travel</option>
                <option value="finans">Finance</option>
                <option value="hobi">Hobby</option>
                <option value="dinlenme">Rest</option>
                <option value="bos">Free time</option>
              </select>
            </label>
            <div class="form-actions">
              <button class="primary-button compact-action" type="submit">Add routine</button>
              <button class="secondary-button compact-action" id="resetRoutineButton" type="button">Clear</button>
            </div>
          </form>

          <section>
            <h3>Saved routines</h3>
            <div id="routineManagerList" class="routine-list routine-manager-list"></div>
          </section>
        </div>
      </div>
    </section>

    <template id="eventCardTemplate">
      <article class="event-card">
        <div class="event-color"></div>
        <div class="event-body">
          <div class="event-title-row">
            <h3></h3>
            <span class="event-time"></span>
          </div>
          <p class="event-meta"></p>
          <p class="event-notes"></p>
          <div class="event-actions"></div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
